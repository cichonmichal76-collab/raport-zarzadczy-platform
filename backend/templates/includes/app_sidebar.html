<aside class="{% if sidebar_class %}{{ sidebar_class }}{% else %}sidebar{% endif %}">
  <nav class="{% if sidebar_nav_class %}{{ sidebar_nav_class }}{% endif %}">
    <details class="sidebar-group" open>
      <summary class="sidebar-group-toggle{% if request.path == "/" or request.path == "/bi/" %} is-current{% endif %}">Raporty BI</summary>
      <div class="sidebar-subnav">
        <a href="/" {% if request.path == "/" %}class="is-current"{% endif %}>Dashboard</a>
        <a href="/bi/" {% if request.path == "/bi/" %}class="is-current"{% endif %}>Przeglad BI</a>
      </div>
    </details>

    <details class="sidebar-group" {% if request.path == "/production/" %}open{% endif %}>
      <summary class="sidebar-group-toggle{% if request.path == "/production/" %} is-current{% endif %}">Produkcja</summary>
      <div class="sidebar-subnav">
        <a href="/production/" {% if request.path == "/production/" %}class="is-current"{% endif %}>Panel produkcji</a>
      </div>
    </details>

    <details class="sidebar-group" {% if request.path == "/rnd/" %}open{% endif %}>
      <summary class="sidebar-group-toggle{% if request.path == "/rnd/" %} is-current{% endif %}">B+R</summary>
      <div class="sidebar-subnav">
        <a href="/rnd/" {% if request.path == "/rnd/" %}class="is-current"{% endif %}>Panel B+R</a>
      </div>
    </details>

    {% if request.user.is_authenticated and request.user.is_staff %}
    <details class="sidebar-group" {% if "/admin/" in request.path or "/imports/" in request.path %}open{% endif %}>
      <summary class="sidebar-group-toggle{% if "/admin/" in request.path or "/imports/" in request.path %} is-current{% endif %}">Administracja</summary>
      <div class="sidebar-subnav">
        <a href="/admin/" {% if "/admin/" in request.path %}class="is-current"{% endif %}>Django Admin</a>
        <a href="/imports/upload/" {% if "/imports/" in request.path %}class="is-current"{% endif %}>Wgraj dane</a>
      </div>
    </details>
    {% endif %}
  </nav>
</aside>
